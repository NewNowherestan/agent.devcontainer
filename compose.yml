# docker compose run --build --rm claude
# docker compose run --rm claude
# (No ports: are declared here on purpose. Port publishing is the PARENT
#  project's concern — its root Makefile passes PUBLISH="--publish <host>:8080"
#  to `make agent`, so host-port choices live in one per-project place and
#  a submodule-local `make agent` stays port-free / conflict-free.)
#
# One-time, on the host, before either agent needs to reach project infra
# (e.g. Ippodromo's Postgres in ../app/compose.yaml):
#   docker network create agent-ai_network
# Both compose files below join this shared network as an *additional* network
# (each keeps its own project-default network too), so a container in one
# compose project can resolve and reach a container in the other by service
# name — e.g. from inside `claude`: jdbc:postgresql://postgres:5432/ippodromo.
# This grants network reachability only; it does not give either agent
# container the docker CLI or the docker socket.
services:
  claude:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ../:/workspace
      # Persists Claude login/config across runs (CLAUDE_CONFIG_DIR points all
      # state here in the Dockerfile, so .claude.json + credentials survive --rm).
      - ${HOME}/.claude:/home/vscode/.claude
    working_dir: /workspace
    stdin_open: true   # keeps -i
    tty: true          # keeps -t
    command: claude --remote-control --dangerously-skip-permissions
    networks: [default, agent-ai_network]
    # MVP-INFRA-T1 (2026-07-16): the Ippodromo board/observer runs INSIDE this container
    # (evolve serves 8080 while a season runs; the verb-less boot serves it any time).
    # 2026-07-17: the 8088:8080 publish moved out of this file into the parent
    # project's root Makefile (BOARD_PORT, default 8088 → http://localhost:8088),
    # passed as `docker compose run --publish ...` only when launched from the
    # project root — `make agent` from this submodule publishes nothing.
    # No memory limit is set here on purpose: the container sees the whole Docker VM; the
    # season-scale OOM was the JVM's own 2GB ergonomic default, fixed in ippocliw (MVP-FIX-T2).
    # Uncomment to add the egress firewall later:
    # cap_add: [NET_ADMIN, NET_RAW]

  grok:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.grok     # ← separate Dockerfile
    volumes:
      - ../:/workspace
      # Persists Grok login + config across runs
      - ${HOME}/.grok:/home/vscode/.grok
    working_dir: /workspace
    stdin_open: true
    tty: true
    # === Autonomous mode (analog to Claude's dangerously-skip-permissions) ===
    command: grok --always-approve
    networks: [default, agent-ai_network]

networks:
  agent-ai_network:
    external: true
